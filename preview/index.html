<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Ready — Preview</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #f0f1f3; font-family: -apple-system, "Inter", sans-serif; }
      .preview-shell { height: 100vh; display: flex; flex-direction: column; }

      /* ── Top bar ── */
      .preview-header {
        padding: 0 16px; background: #111; color: #fff; height: 44px; flex-shrink: 0;
        display: flex; align-items: center; gap: 12px;
      }
      .preview-header strong { font-size: 13px; letter-spacing: -0.2px; }
      .preview-header-hint { font-size: 11px; color: #666; margin-left: auto; }

      /* ── Nav sidebar ── */
      .preview-body { flex: 1; display: flex; overflow: hidden; }
      .preview-nav {
        width: 200px; flex-shrink: 0; background: #1a1a1a; overflow-y: auto;
        padding: 12px 8px;
      }
      .preview-nav-section {
        font-size: 10px; color: #555; text-transform: uppercase;
        letter-spacing: 0.8px; padding: 8px 8px 4px;
      }
      .preview-nav-item {
        display: block; width: 100%; text-align: left; background: none; border: none;
        cursor: pointer; padding: 7px 10px; border-radius: 6px; color: #aaa;
        font-size: 12px; line-height: 1.3;
      }
      .preview-nav-item:hover { background: #2a2a2a; color: #fff; }
      .preview-nav-item.active { background: #2e2e2e; color: #fff; font-weight: 600; }
      .preview-nav-item small { display: block; font-size: 10px; color: #555; margin-top: 1px; }
      .preview-nav-item.active small { color: #777; }

      /* ── Stage ── */
      .preview-stage {
        flex: 1; padding: 32px; display: flex; justify-content: center; align-items: flex-start;
        overflow: auto;
      }
      .preview-wrap { display: flex; flex-direction: column; align-items: center; }
      .preview-frame {
        background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.12); border-radius: 12px;
        overflow: hidden; flex-shrink: 0;
      }
      .preview-frame-label {
        font-size: 11px; color: #999; text-align: center; margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
