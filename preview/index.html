<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Ready — Preview</title>
    <style>
      html, body, #root { margin: 0; padding: 0; background: #f4f5f7; font-family: Inter, -apple-system, sans-serif; }
      .preview-shell { min-height: 100vh; display: flex; flex-direction: column; }
      .preview-header {
        padding: 10px 16px; background: #111; color: #fff; font-size: 12px;
        display: flex; justify-content: space-between; align-items: center;
      }
      .preview-stage {
        flex: 1; padding: 24px; display: flex; justify-content: center; align-items: flex-start;
      }
      .preview-frame {
        background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.08); border-radius: 8px;
        overflow: auto; max-width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <link rel="stylesheet" href="/foundation/line-colors.css" />
    <link rel="stylesheet" href="/foundation/semantic-colors.css" />
    <link rel="stylesheet" href="/foundation/object-styles.css" />
    <link rel="stylesheet" href="/foundation/typography.css" />
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
